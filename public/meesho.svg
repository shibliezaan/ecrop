<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop on Meesho</title>
  <link rel="icon" href="https://www.meesho.com/favicon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #fde6f2, #fff0f7); /* soft pink theme */
      font-family: Arial, sans-serif;
    }

    /* Header */
    header {
      max-width: 100%;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      background: white;
      border-bottom: 1px solid #ddd; /* subtle border instead of shadow */
    }

    header img {
      width: 156px; /* fixed width */
      height: auto; /* maintain aspect ratio */
      cursor: pointer;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column; /* stack text above button */
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .message {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 20px;
    }

    .btn {
      padding: 15px 35px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      background-color: rgb(159, 32, 137); /* Meesho brand color */
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: rgb(130, 25, 112); /* Slightly darker shade */
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <!-- Header with Meesho Logo -->
  <header>
    <a href="https://www.meesho.com" target="_blank">
      <img src="https://www.meesho.com/assets/svgicons/meeshoLogo.svg" alt="Meesho Logo">
    </a>
  </header>

  <!-- Centered Content -->
  <main>
    <p class="message">The page you're looking for couldn't be found— but you can continue to shop on Meesho.</p>
    <button class="btn" onclick="window.location.href='https://www.meesho.com'">
      Shop on Meesho
    </button>
  </main>
</body>
</html>
